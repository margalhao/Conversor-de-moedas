<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js"></script>
    <title>Conversor Online</title>
</head>

<body>
    <img class="logo-conversor" src="/assets/logo.gif" alt="Logo-conversor">
    <main>
        <label>
            Converter de
            <select>
                <option>R$ Real Brasileiro</option>
            </select>
        </label>

        <label>
            Converter para
            <select>
                <option>US$ Dólar Americano</option>
                <option>€ Euro</option>
            </select>
        </label>

        <label>
            Valor
            <input placeholder="Valor" </label>

            <button> Converter</button>

            <section>
                <div class="currency-box">
                    <img src="/assets/real.png" alt="moeda-real">
                    <p class="currency">Real</p>
                    <p class="currency-value">R$ 0,00</p>
                </div>

                <img class="arrow-img" src="/assets/arrow.png" alt="seta-baixo">

                <div class="currency-box">
                    <img src="/assets/dollar.png" alt="moeda-dolar">
                    <p class="currency">Dólar</p>
                    <p class="currency-value">US$ 0,00</p>
                </div>
            </section>
    </main>
</body>

</html>
